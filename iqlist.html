    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            color: #333;
            background-color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        thead {
            background-color: #fafafa;
            border-bottom: 2px solid #e0e0e0;
        }

        th,
        td {
            padding: 10px 15px;
            border-bottom: 1px solid #f0f0f0;
            text-align: left;
            vertical-align: top;
            font-size: 14px;
        }

        th {
            font-weight: 600;
            text-align: center;
        }

        tbody tr:hover {
            background-color: #f9f9f9;
        }

        .platform-header {
            display: flex;
            align-items: center;
            gap: 5px;
            justify-content: center;
        }

        .platform-icon {
            width: 20px;
            height: 20px;
        }

        .desc {
            font-size: 13px;
            color: #555;
        }

        @media (max-width: 768px) {

            th,
            td {
                padding: 8px 10px;
                font-size: 12px;
            }

            .desc {
                font-size: 11px;
            }
        }
    </style>
    <script src="/iqlist.js"></script>
</head>

        const icons = {
            android: "assets/android.svg",
            ios: "assets/ios.svg",
            reactNative: "assets/react.svg",
            flutter: "assets/flutter.svg",
            xamarin: "assets/x.svg",
            ionic: "assets/ionic.svg",
        };

        const platforms = ["android", "ios", "reactNative", "flutter", "xamarin", "ionic"];

        function App() {
            const topicCount = topicsData.android.length;

            return (
                <div>
                    <div class="switch">
                        <label>
                            <input id="dark-mode-toggle" type="checkbox" onClick={() => checkChange()} />
                            <h4>Dark Mode</h4>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <h1 class="gradient-text" id="title">
                        Interview Questions by AI Similarity</h1>
                    <table>
                        <thead>
                            <tr>
                                <th>Topic</th>
                                {platforms.map(platform => (
                                    <th key={platform}>
                                        <div className="platform-header">
                                            <img src={icons[platform]} className="platform-icon" alt={platform} />
                                            {platform.charAt(0).toUpperCase() + platform.slice(1).replace(/([A-Z])/g, ' $1')}
                                        </div>
                                    </th>
                                ))}
                            </tr>
                        </thead>
                        <tbody>
                            {Array.from({ length: topicCount }).map((_, idx) => (
                                <tr key={idx}>
                                    <td><strong>{topicsData.android[idx].title}</strong></td>
                                    {platforms.map(platform => (
                                        <td key={platform}>
                                            {topicsData[platform][idx] ?
                                                <div>
                                                    <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                                                        <strong>{topicsData[platform][idx].title}</strong>
                                                        {topicsData[platform][idx].link && (
                                                            <a
                                                                href={topicsData[platform][idx].link}
                                                                target="_blank"
                                                                rel="noopener noreferrer"
                                                                style={{ textDecoration: 'none' }}
                                                            >
                                                                <svg
                                                                    title="View More"
                                                                    xmlns="http://www.w3.org/2000/svg"
                                                                    viewBox="0 0 24 24"
                                                                    width="16"
                                                                    height="16"
                                                                    style={{ cursor: 'pointer', color: '#2892D7', verticalAlign: 'middle' }}
                                                                    fill="none"
                                                                    stroke="#2892D7"
                                                                    strokeWidth="1.6"
                                                                    strokeLinecap="round"
                                                                    strokeLinejoin="round"
                                                                >
                                                                    <path d="M7 17L17 7" />
                                                                    <path d="M7 7h10v10" />
                                                                </svg>
                                                            </a>
                                                        )}
                                                    </div>
                                                    <div className="desc">{topicsData[platform][idx].description}</div>
                                                </div> : <em style={{ color: "#aaa" }}>Coming Soon</em>}
                                        </td>
                                    ))}
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
